<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Админ Панель - Toktogul Cinema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Admin.css">
     <link rel="stylesheet" href="tost.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="background: #121212; color: white; font-family: 'Plus Jakarta Sans', sans-serif;">

    <header class="app-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="logo-text" style="font-size: 20px; font-weight: 800; letter-spacing: 1px;">
            ADMIN<span style="color: #a855f7;">PANEL</span>
        </div>
        <div style="display: flex; gap: 15px;">
            <button onclick="goHome()" style="background:none; border:none; color:white; cursor:pointer;">
                <span class="material-icons-round">home</span>
            </button>
            <button onclick="handleLogout()" style="background:none; border:none; color:#ff4757; cursor:pointer;">
                <span class="material-icons-round">logout</span>
            </button>
        </div>
    </header>

    <main id="admin-panel-ui" style="padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 120px;">
        
        <div id="tab-requests" class="admin-tab-content">
            <h3 style="margin-bottom: 20px; font-size: 18px;">Жаңы өтүнмөлөр</h3>
            <div id="admin-tickets-list">
                </div>
        </div>

        <div id="tab-movies" class="admin-tab-content" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 18px;">Кинолор тизмеси</h3>
                <button class="btn-main" onclick="openAddMovieFs()" style="padding: 10px 15px; border-radius: 12px; font-size: 14px; background: linear-gradient(135deg, #a855f7, #ec4899); border: none; color: white; display: flex; align-items: center; gap: 5px;">
                    <span class="material-icons-round">add</span> Кошуу
                </button>
            </div>
            <div id="admin-movie-list">
                </div>
        </div>

        <div id="tab-scanner" class="admin-tab-content" style="display: none;">
            <h3 style="text-align: center; margin-bottom: 20px;">Билетти текшерүү</h3>
            <div class="scanner-wrapper" style="background: #1e1e1e; padding: 10px; border-radius: 24px; border: 2px solid #a855f7; overflow: hidden;">
                <div id="reader" style="width: 100%;"></div>
            </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" id="nav-requests" onclick="switchAdminTab('requests')">
            <span class="material-icons-round">confirmation_number</span>
            <span>Өтүнмөлөр</span>
        </button>
        
        <div class="nav-scan-wrapper">
            <button class="nav-scan-btn" onclick="switchAdminTab('scanner')">
                <span class="material-icons-round">qr_code_scanner</span>
            </button>
        </div>

        <button class="nav-item" id="nav-movies" onclick="switchAdminTab('movies')">
            <span class="material-icons-round">movie</span>
            <span>Кинолор</span>
        </button>
    </nav>

    <div id="add-movie-modal" class="modal-overlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(10px);">
        <div class="modal-content" style="background: #1e293b; width: 90%; max-width: 400px; padding: 25px; border-radius: 28px; position: relative;">
            <span class="close-modal material-icons-round" onclick="closeAddMovieFs()" style="position: absolute; top: 15px; right: 15px; cursor: pointer; color: #94a3b8;">close</span>
            
            <h2 class="modal-title" style="font-size: 22px; margin-bottom: 20px;">Жаңы кино</h2>
            
            <select id="new-movie-category" class="input-box" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px;">
                <option value="now" style="background: #1e293b;">Азыр кинодо</option>
                <option value="soon" style="background: #1e293b;">Жакында</option>
            </select>
            
            <input type="text" id="new-movie-title" placeholder="Кинонун аты" class="input-box" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; outline: none;">
            
            <label for="movie-file-input" style="display: block; padding: 12px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.3); border-radius: 15px; text-align: center; cursor: pointer; margin-bottom: 20px;">
                <span id="file-status-text">🖼️ Сүрөт тандоо</span>
            </label>
            <input type="file" id="movie-file-input" accept="image/*" style="display: none;" onchange="document.getElementById('file-status-text').innerText='Тандалды ✅'">

            <div class="sessions-admin-section" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; margin-bottom: 20px;">
                <p style="color: #94a3b8; font-size: 13px; margin-bottom: 10px;">Сеанстарды кошуу:</p>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="time" id="session-time-input" style="flex: 1; background: #121212; border: none; padding: 8px; border-radius: 10px; color: white;">
                    <input type="number" id="session-price-input" placeholder="Баа" style="flex: 1; background: #121212; border: none; padding: 8px; border-radius: 10px; color: white;">
                    <button onclick="addSessionToList()" style="background: #a855f7; border: none; border-radius: 10px; width: 40px; color: white; cursor: pointer;">
                        <span class="material-icons-round">add</span>
                    </button>
                </div>
                <div id="added-sessions-preview" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
            </div>

            <button class="btn-main" onclick="handleAddMovie()" style="width: 100%; padding: 15px; border-radius: 18px; background: linear-gradient(135deg, #a855f7, #ec4899); border: none; color: white; font-weight: 800; cursor: pointer;">Жүктөө</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="Admin.js"></script>

</body>
</html>
